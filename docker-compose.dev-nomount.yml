services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: wa-automater-dev:latest
    container_name: wa-automater-web-dev
    working_dir: /app/wa_automater
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      WA_DEMO_USERNAME: test_user
      WA_DEMO_PASSWORD: test1234
      WA_DEMO_EMAIL: testuser@example.local
      WA_DEMO_IS_STAFF: "False"
      WA_DEMO_IS_SUPERUSER: "False"
    command: sh -c "python manage.py migrate && python manage.py ensure_test_user && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
