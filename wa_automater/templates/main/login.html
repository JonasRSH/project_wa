{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="margin-top: 5.5rem !important;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3>Login</h3>
                </div>
                <div class="card-body">
                    <div id="login-info-box" class="login-info-box" role="status" aria-live="polite">
                        <span class="login-info-text">Test user login upon request</span>
                        <div class="login-info-actions">
                            <button
                                type="button"
                                class="login-info-request"
                                style="margin:0; width:auto;"
                                onclick="window.location.href='mailto:jonas.huggler@gmail.com?subject=Test%20User%20Request'"
                            >
                                Request
                            </button>
                            <button type="button" class="login-info-close" aria-label="Infofenster schliessen" onclick="document.getElementById('login-info-box').style.display='none';">
                                &times;
                            </button>
                        </div>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Benutzername oder Passwort ist ungültig.
                        </div>
                    {% endif %}
                    <form method="post" action="">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="id_username">Benutzername</label>
                            <input type="text" name="username" autofocus required class="form-control" id="id_username">
                        </div>
                        <div class="form-group">
                            <label for="id_password">Passwort</label>
                            <input type="password" name="password" required class="form-control" id="id_password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
