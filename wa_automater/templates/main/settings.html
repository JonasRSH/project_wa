{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="margin-top: 5.5rem !important;">
    <h2>Einstellungen</h2>
    <div class="row">
        <div class="col-md-6">
            <h4>LKWs verwalten</h4>
            <form method="post" action="" class="mb-3">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="add_abfahrt">
                <div class="form-group mb-2">
                    <input type="text" name="abfahrt_name" placeholder="Abfahrt" class="form-control mb-2" required>
                </div>
                <div class="form-group mb-2">
                    <input type="text" name="abfahrt_kennzeichen" placeholder="Kennzeichen Motorwagen" class="form-control mb-2" required>
                </div>
                <div class="form-group mb-2">
                    <input type="text" name="abfahrt_anhaenger" placeholder="Kennzeichen Anhänger (optional)" class="form-control mb-2">
                </div>
                <button type="submit" class="btn btn-success mb-2">Hinzufügen</button>
            </form>
            <form method="post" action="" class="mb-3">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="delete_abfahrt">
                <div class="form-group mb-2">
                    <label>Abfahrt löschen:</label>
                    <select name="delete_abfahrt_id" class="form-control mb-2" required>
                        {% for abfahrt in abfahrten %}
                            <option value="{{ abfahrt.id }}">{{ abfahrt.name }} ({{ abfahrt.kennzeichen }})</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-danger">Löschen</button>
            </form>
        </div>
        <div class="col-md-6">
            <h4>Zollstellen verwalten</h4>
            <form method="post" action="" class="mb-3">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="add_zollamt">
                <div class="form-group mb-2">
                    <input type="text" name="zollamt_name" placeholder="Zollamt-Name" class="form-control mb-2" required>
                </div>
                <div class="form-group mb-2">
                    <select name="zollamt_typ" class="form-control mb-2" required>
                        <option value="abgang">Abgangszollstelle</option>
                        <option value="grenz">Grenzzollstelle</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success mb-2">Hinzufügen</button>
            </form>
            <form method="post" action="" class="mb-3">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="delete_zollamt">
                <div class="form-group mb-2">
                    <label>Zollamt löschen:</label>
                    <select name="delete_zollamt_id" class="form-control mb-2" required>
                        {% for zollamt in zollämter %}
                            <option value="{{ zollamt.id }}">{{ zollamt.name }} ({{ zollamt.get_typ_display }})</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-danger">Löschen</button>
            </form>
        </div>
    </div>
</div>
<div class="mt-4">
    <a href="{% url 'main' %}" class="btn btn-secondary">Zurück zur Hauptseite</a>
</div>
{% endblock %}
