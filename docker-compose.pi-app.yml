services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: wa-automater-pi-app:latest
    container_name: wa-automater-web
    working_dir: /app/wa_automater
    command: sh -c "python manage.py migrate && python manage.py ensure_test_user && python manage.py collectstatic --noinput && gunicorn wa_automater.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-for-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-wa-generator.jonashuggler.ch,localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://wa-generator.jonashuggler.ch}
      WA_DEMO_USERNAME: ${WA_DEMO_USERNAME:-test_user}
      WA_DEMO_PASSWORD: ${WA_DEMO_PASSWORD:-test1234}
      WA_DEMO_EMAIL: ${WA_DEMO_EMAIL:-testuser@example.local}
      WA_DEMO_IS_STAFF: ${WA_DEMO_IS_STAFF:-False}
      WA_DEMO_IS_SUPERUSER: ${WA_DEMO_IS_SUPERUSER:-False}
    ports:
      - "8081:8000"
    restart: unless-stopped