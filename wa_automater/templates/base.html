<!DOCTYPE html>
<html lang="de">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'main/style.css' %}">
    <title>WA Automater</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-3 custom-navbar">
        <a class="navbar-brand" href="/">WA Generator</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item mr-3">
                    <a class="nav-link" href="{% url 'settings' %}">
                        <span class="oi oi-cog"></span> Einstellungen
                    </a>
                </li>
                {% if user.is_authenticated %}
                <li class="nav-item mr-3">
                    <a class="nav-link font-weight-bold text-success" href="#" tabindex="-1" aria-disabled="true" style="pointer-events:none;">
                        <i class="bi bi-person-circle" style="font-size: 1.5rem; margin-right: 6px;"></i>
                        {{ user.username }}
                    </a>
                </li>
                <li class="nav-item">
                    {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'logout' %}">
                        <span class="oi oi-account-logout"></span> Logout
                    </a>
                    {% endif %}
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'login' %}">
                        <i class="bi bi-person-circle" style="font-size: 1.5rem; margin-right: 6px;"></i>
                        <span class="d-none d-md-inline">LOGIN</span>
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
