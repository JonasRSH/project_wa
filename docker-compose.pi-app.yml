version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-automater-web
    working_dir: /app/wa_automater
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn wa_automater.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    env_file:
      - .env.pi
    ports:
      - "127.0.0.1:18000:8000"
    restart: unless-stopped